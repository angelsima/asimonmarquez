<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chorro de Amor Constante</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let particles = [];
    const colors = ['#FF1493', '#FF69B4', '#FF4500', '#FF0000', '#C71585'];

    class TeQuiero {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            
            // Ángulo aleatorio 360 grados
            const angle = Math.random() * Math.PI * 2;
            // VELOCIDAD MUCHO MÁS RÁPIDA
            const speed = Math.random() * 10 + 5; 
            
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            
            this.size = 5; 
            this.opacity = 1;
            this.growth = Math.random() * 0.8 + 0.4; // Crecen más rápido
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.size += this.growth;
            this.opacity -= 0.015; // Desaparecen más rápido para mantener fluidez
        }

        draw() {
            ctx.font = `bold ${this.size}px Arial`;
            ctx.fillStyle = `rgba(${this.hexToRgb(this.color)}, ${this.opacity})`;
            ctx.textAlign = 'center';
            ctx.fillText("Te quiero", this.x, this.y);
        }

        hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r},${g},${b}`;
        }
    }

    function animate() {
        // Fondo blanco
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // GENERACIÓN CONSTANTE: Creamos 3 nuevos "Te quiero" en cada frame
        for(let i = 0; i < 3; i++) {
            particles.push(new TeQuiero());
        }

        // Actualizar y dibujar
        particles.forEach((p, index) => {
            p.update();
            p.draw();
            
            // Eliminar partículas invisibles para que el PC no explote
            if (p.opacity <= 0) {
                particles.splice(index, 1);
            }
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
