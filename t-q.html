
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manguera de Amor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Ajustar el canvas al tamaño de la ventana
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const particles = [];
    const colors = ['#FF1493', '#FF69B4', '#FF4500', '#FF0000', '#C71585'];

    class TeQuiero {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            // Velocidad y ángulo aleatorio para el efecto "chorro"
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 4 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            
            this.size = 10; // Tamaño inicial
            this.opacity = 1;
            this.growth = Math.random() * 0.5 + 0.2; // Qué tan rápido crece
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.size += this.growth; // Crece mientras se aleja
            this.opacity -= 0.005;   // Se desvanece poco a poco

            if (this.opacity <= 0) {
                this.reset(); // Reinicia la partícula cuando desaparece
            }
        }

        draw() {
            ctx.font = `bold ${this.size}px Arial`;
            ctx.fillStyle = `rgba(${this.hexToRgb(this.color)}, ${this.opacity})`;
            ctx.textAlign = 'center';
            ctx.fillText("Te quiero", this.x, this.y);
        }

        // Utilidad para manejar la opacidad con colores HEX
        hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r},${g},${b}`;
        }
    }

    // Crear el chorro inicial
    for (let i = 0; i < 50; i++) {
        particles.push(new TeQuiero());
    }

    function animate() {
        // Limpiar el fondo en cada frame
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
